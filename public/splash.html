<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starting NEXA POS</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        display: grid;
        place-items: center;
        color: #0f172a;
        background:
          radial-gradient(circle at 100% 0, #dbeafe 0 22%, transparent 22.5%),
          radial-gradient(circle at 0 100%, #ede9fe 0 21%, transparent 21.5%),
          linear-gradient(145deg, #f8faff, #eef2ff);
        font-family: "Segoe UI", Arial, sans-serif;
        user-select: none;
      }
      main { width: 100%; padding: 28px; text-align: center; }
      img { display: block; width: 210px; height: 92px; margin: 0 auto 14px; object-fit: contain; }
      h1 { margin: 0; font-size: 23px; letter-spacing: -.02em; }
      p { margin: 7px 0 0; color: #64748b; font-size: 12px; }
      .loader { display: flex; justify-content: center; gap: 6px; margin-top: 22px; }
      .loader i { width: 7px; height: 7px; border-radius: 50%; background: #4f46e5; animation: pulse 1.1s ease-in-out infinite; }
      .loader i:nth-child(2) { animation-delay: .14s; }
      .loader i:nth-child(3) { animation-delay: .28s; }
      small { display: block; margin-top: 13px; color: #94a3b8; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }
      @keyframes pulse { 0%, 80%, 100% { opacity: .25; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-4px); } }
      @media (prefers-reduced-motion: reduce) { .loader i { animation: none; opacity: .7; } }
    </style>
  </head>
  <body>
    <main role="status" aria-live="polite">
      <img src="/branding/nexa-systems-logo-transparent.png" alt="NEXA Systems" />
      <h1>Point of Sale</h1>
      <p>Preparing your terminal and local data</p>
      <div class="loader" aria-hidden="true"><i></i><i></i><i></i></div>
      <small>Offline-ready terminal</small>
    </main>
  </body>
</html>
